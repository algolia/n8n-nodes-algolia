name: Generate Properties on Specs Update

on:
  pull_request:
    paths:
      - 'nodes/Algolia/specs/*.json'

jobs:
  generate-properties:
    if: startsWith(github.head_ref, 'feat/auto-openapi-sync')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          npm-auth-token: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Generate properties
        run: npm run generate

      - name: Format code
        run: npx prettier --write .

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          commit-message: 'chore(nodes): auto-generate properties from updated specs'
          github-token: ${{ secrets.ALGOLIA_BOT_TOKEN }}
