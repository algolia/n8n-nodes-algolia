name: Validate lint

on:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          npm-auth-token: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Lint code
        run: npm run lint
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
