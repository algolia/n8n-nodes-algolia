name: Setup Node.js
description: Setup Node.js and install dependencies (repo must already be checked out)

inputs:
  npm-auth-token:
    description: NPM auth token for installing private packages
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.tool-versions'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
      shell: bash
      env:
        NPM_AUTH_TOKEN: ${{ inputs.npm-auth-token }}
